# Default configuration for automated implementation/review cycles.
# Override with --config in launch_review_cycle.py.

# Home-relative runtime defaults (portable across users/hosts).
queue_dir: ~/.openclaw/tasks/pending
workspace_dir: .openclaw/review-cycles

cycle:
  rounds: 3
  timeout_minutes: 180
  checkpoint: none
  max_rounds: 8

context_pack:
  enabled: false
  filename: context_pack.md

agents:
  implement:
    agent: codex
    # Optional explicit model override. Leave null to use difficulty routing.
    model: null
    difficulty: 3
    mcp_servers: []
  review:
    # Direct review proved non-truthful for local repo work because it cannot
    # read implementation artifacts or emit file-based review outputs without a
    # shim. Use a workspace agent by default so review can inspect local files,
    # write review.json directly, and participate in the commit-gated path.
    agent: codex
    model: null
    difficulty: 5
    mcp_servers: []
  context:
    agent: codex
    model: null
    difficulty: 2
    mcp_servers: []
  synthesis:
    agent: codex
    model: null
    difficulty: 2
    mcp_servers: []

validation:
  require_json_review: true

# Cost guardrails
cost:
  # Max total cost per review cycle (all rounds combined)
  max_cycle_cost_usd: 10.0
  # Tasks exceeding this per-round cost trigger a warning
  warn_round_cost_usd: 5.0
  # gpt-5.2-pro is reserved for convergence/architecture reviews only.
  # Routine fixes should use cheaper models via difficulty routing.
