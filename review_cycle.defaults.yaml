# Default configuration for automated implementation/review cycles.
# Override with --config in launch_review_cycle.py.

# Home-relative runtime defaults (portable across users/hosts).
queue_dir: ~/.openclaw/tasks/pending
workspace_dir: ~/.openclaw/workspace/review-cycles

cycle:
  rounds: 3
  timeout_minutes: 180
  checkpoint: none
  max_rounds: 8

context_pack:
  enabled: true
  filename: context_pack.md

agents:
  implement:
    agent: codex
    # Optional explicit model override. Leave null to use difficulty routing.
    model: null
    difficulty: 3
    mcp_servers: []
  review:
    # Must be an agent model (codex/claude-code) — the review task writes a JSON
    # file that downstream tasks depend on. Text-only models (gpt-5.2-pro, gemini)
    # cannot write files and will fail the file_exists + json_schema validators.
    agent: codex
    model: codex
    difficulty: 4
    mcp_servers: []
  context:
    # Must be an agent model — context_init and context_update write .md files
    # to ~/.openclaw/workspace/review-cycles/. Text models cannot satisfy
    # file_exists validators.
    agent: codex
    model: codex
    difficulty: 2
    mcp_servers: []
  synthesis:
    agent: codex
    model: codex
    difficulty: 2
    mcp_servers: []

validation:
  require_json_review: true

# Cost guardrails
cost:
  # Max total cost per review cycle (all rounds combined)
  max_cycle_cost_usd: 10.0
  # Tasks exceeding this per-round cost trigger a warning
  warn_round_cost_usd: 5.0
  # gpt-5.2-pro is reserved for convergence/architecture reviews only.
  # Routine fixes should use cheaper models via difficulty routing.
